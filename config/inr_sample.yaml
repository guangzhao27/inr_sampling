defaults:
  - _self_
  - data: null
  - optim: null
  - inr: null
  - wandb: null

hydra:
  job:
    chdir: False

#continue:
saved_checkpoint : False
checkpoint_path :

data:
  data_path: "./data/NS2d/ns_mmap"
  data_type: mmap
  mmap_dir: '/pscratch/sd/g/gzhao27/INR/SOMA/results/soma_mmap_save'
  dataset_name: "NS"
  # Supported dataset_name values:
  #   NS          : 2D Navier-Stokes  -- data_path to .npy / ns_mmap / hdf5
  #   SOMA        : 3D ocean (SOMA)   -- data_path to thedataset-impliciBottomDrag.hdf5
  #   Burgers     : 1D Burgers        -- data_path unused (hard-coded HDF5 paths)
  #   Burgers2D   : 2D Burgers        -- data_path = directory containing
  #                                      2D_Burgers_Sols_Nu{nu}.hdf5 files
  #                                      (generate with: python utils/data/generate_burgers2d.py)
  #                                      e.g. /pscratch/sd/g/gzhao27/INR/data
  #   PoolBoiling2D : pool-boiling CFD -- data_path = directory containing
  #                                      Twall-*.hdf5 files, field_key defaults to
  #                                      "temperature" with shape (T, H, W)
  #   Piecewise2D : synthetic 2D piecewise function (in-memory, no disk needed)
  #                 f(x,y) = sin(2πx) + beta * I(y>0.5) * sin(2π·alpha·y)
  #                 configure with piecewise_* keys below
  data_to_encode:
  missing_rate:
  ntrain : 
  ntest : 
  sub_from :
  space_factor : 1 # space resolution
  time_factor : 1
  seed: 15
  val_missing_rate: 0.0
  sub_array_num: 1
  split_ratios:
    - 0.7
    - 0.15
    - 0.15
  single_time_frame: 10
  # Burgers2D runtime options (used when dataset_name = Burgers2D)
  burgers2d_nu: 0.01          # selects file 2D_Burgers_Sols_Nu{nu}.hdf5
  burgers2d_sample_idx: 0     # selects trajectory index within tensor[N, T, H, W]
  # PoolBoiling2D runtime options (used when dataset_name = PoolBoiling2D)
  poolboiling_condition: 100   # default file selector: Twall-{condition}.hdf5
  poolboiling_file:            # optional explicit file name, e.g. Twall-100.hdf5
  poolboiling_key: temperature # HDF5 field key for supervision target
  poolboiling_sample_idx: 0    # only used when selected field has shape [N, T, H, W]
  # Piecewise2D dataset parameters (only used when dataset_name = Piecewise2D)
  piecewise_resolution: 1024   # grid size H = W = resolution
  piecewise_alpha: 20.0       # high-frequency multiplier in y (right half, x > 0.5)
  piecewise_beta: 1.0         # amplitude of high-frequency term
  piecewise_eps:  0.02        # smoothing width for step indicator; null = hard step

optim:
  optimizer: adamw   # supported: adamw, sgd
  batch_size: 32
  batch_size_val: 
  lr_inr : 0.000005
  adamw_weight_decay: 0.0
  sgd_momentum: 0.9
  sgd_dampening: 0.0
  sgd_weight_decay: 0.0
  sgd_nesterov: False
  lr_code : 0.01
  meta_lr_code : 0.000005
  weight_decay_code: 0
  inner_steps : 3
  epochs : 10000
  evo_every_epochs: 100

inr:
  model_type : "siren"  # supported: siren, ssn, single_image_siren, single_image_fourier_mlp
  latent_dim : 256
  depth : 5
  hidden_dim : 256
  w0 : 30.0
  fourier_mapping_size: 256
  fourier_scale: 10.0
  fourier_include_input: True
  fourier_activation: "relu"
  use_latent: True
  modulate_scale: False
  modulate_shift: True
  hypernet_depth: 1
  hypernet_width: 128
  last_activation: 
  loss_type: "mse"  # All below are for EVOS only
  use_lr_scheduler: False
  multi_data: False
  signal_type: "image"
  eval_lpips: False
  # Check if redundant
  # hidden_layers: 6
  # hidden_features: 155
  # first_omega: 30
  # hidden_omega: 30
  # first_bias_scale: None
  # scale_req_grad: False
  # N_freqs: 10
  # scale: 30

wandb:
  use_wandb: False
  project: "functa2functa"
  name: 
  id: 
  sweep_id:

sampling:
  type: "random"
  rate: 0.2
  adaptive_mode: "loss"            # only used by sampling.type=2d_grid_adaptive: "gradient", "loss", "loss_no_sqrt", or "loss_true"
  adaptive_iterations: 8            # only used by sampling.type=2d_grid_adaptive: quadtree iterative subdivision depth
  adaptive_equal_cell_topk: False   # only used by 2d_grid_adaptive: keep global top-k by prediction dif from sampled candidates
  adaptive_equal_cell_topk_count_mode: "same"  # only used when adaptive_equal_cell_topk=True: "same" or "poisson"
  adaptive_equal_cell_topk_weight_mode: "none" # only used when adaptive_equal_cell_topk=True: "none" or "area_over_count"
  adaptive_weight_mode: "inverse_value"  # only used by 2d_grid_adaptive: "none", "inverse_value", "area_over_count", "sampled_dif"
  adaptive_weight_value_eps: 1e-6   # denominator clamp for inverse_value mode
  adaptive_weight_clip_ratio: 10.0  # clip per-cell weights to median*ratio; <=0 disables clipping
  adaptive_grid_update_interval: 100  # only used by sampling.type=2d_grid_adaptive
  use_weight_function: True          # only used by sampling.type=2d_grid_linear_weighted
  n_clusters_2d_start: 5
  n_clusters_2d_end: 10
  cluster_type: "slic"              # All below are for EVOS only
  sample_num_schedular: "constant"  # "constant", "linear", "step", "cosine", "reverse-cosine"
  lap_coff: 1e-5
  crossover_method: "select"
  use_laplace_epoch: 1500
  mutation_method: "constant"       # "constant", "linear", "exp"
  init_mutation_ratio: 0.5
  end_mutation_ratio: 0.5
  profile_interval_method: "lin_dec"    # "fixed", "lin_dec" 
  init_interval: 100                    # 100
  end_interval: 50                    #50
  profile_guide: "value"            # "value", "diff_1"
  save_dir: "./log"
  tag: "exp"
  up_folder_name: "debug"
  debug: False
  device: "cuda:0"
  log_epoch: 500
  snap_epoch: 5000
  measure_dense_diff: False
  mdd_interval: 1
  measure_crossover_diff: False
  measure_sample_diff: False
  record_indices: False
  dense_measure_psnr: False
# data_folder=""

transform:
  transform: "min_max"
  trans_shift: -0.5
  trans_scale: 2.0
  pn_cum: 0.5
  pn_buffer: -1
  box_shift: 0.1
  pn_alpha: 0.01
  pn_k: 256.0
  pn_beta: 0.05
  gamma_boundary: 5.0
  gamma: 1.0
  inverse: False
  rpp: False
                                    

